name: Deploy NextZen Backend

on:
  push:
    branches: [ production ] # Triggers only on push to production
    paths:
      - 'server/**'      # Only runs if files in the server folder change

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nextzen-backend:latest

      - name: SSH into EC2 and Restart Container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the new image from DockerHub
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/nextzen-backend:latest
            
            # Stop and remove the old container
            docker stop nextzen-api || true
            docker rm nextzen-api || true
            
            # Run the new container with your .env file
            docker run -d \
              --name nextzen-api \
              -p 5000:5000 \
              --env-file .env \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/nextzen-backend:latest
